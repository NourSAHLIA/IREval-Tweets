# Each query has:
#   id: unique identifier (Q1..Q5)
#   text: the search string sent to Twitter API
#   label: human-readable description

queries:
  - id: "Q1"
    text: "Iran oil prices sanctions"
    label: "Effect of Iran sanctions on oil prices"

  - id: "Q2"
    text: "Iran Israel war attack"
    label: "Iran-Israel military conflict"

  - id: "Q3"
    text: "Iran nuclear deal JCPOA"
    label: "Iran nuclear program and deal"

  - id: "Q4"
    text: "Iran drone missile strike"
    label: "Iran drone and missile warfare"

  - id: "Q5"
    text: "Iran economy inflation crisis"
    label: "Iran economic collapse and inflation"
